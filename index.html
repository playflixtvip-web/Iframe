<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX ULTRA - V3</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --red: #E50914; --bg: #000; --card-bg: #141414; --gray: #222; --yellow: #f1c40f; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 2px solid var(--red); }
        header { padding: 12px 15px 5px 15px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--red); text-transform: uppercase; }
        .welcome-center { text-align: center; font-size: 11px; color: #ccc; background: #111; padding: 5px; border-radius: 5px; margin-bottom: 5px; }
        .welcome-center b { color: var(--red); }
        .nav-btns { display: flex; gap: 10px; }
        .btn-logout { background: none; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .search-container { padding: 5px 15px 10px 15px; }
        .search-input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .secao-container { display: flex; gap: 8px; padding: 10px 12px 15px 12px; overflow-x: auto; scrollbar-width: none; background: var(--bg); }
        .btn-secao { padding: 8px 18px; background: var(--gray); border: none; color: #fff; border-radius: 20px; font-weight: bold; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .btn-secao.active { background: var(--red); }
        .row { padding: 5px 0; }
        .row-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 8px; }
        .row-title { font-size: 14px; font-weight: bold; }
        .btn-ver-mais { color: var(--red); font-size: 11px; font-weight: bold; background: none; border: none; cursor: pointer; }
        .shelf { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { min-width: 105px; border-radius: 5px; overflow: hidden; background: var(--card-bg); border: 1px solid #222; position: relative; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-name { padding: 5px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; text-shadow: 0 0 5px #000; color: #ccc; z-index: 10; }
        .fav-star.active { color: var(--yellow); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 15px; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 28px; color: #fff; cursor: pointer; z-index: 1001; }
        .user-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #333; }
        .user-info { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 10px; margin: 8px 0; }
        .btn-adm-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .btn-adm { border: none; padding: 8px; border-radius: 4px; font-size: 9px; font-weight: bold; color: #fff; cursor: pointer; }
        .input-adm { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        #player-box { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        #loading-overlay { display:none; position: fixed; inset:0; background: rgba(0,0,0,0.85); z-index: 3000; align-items:center; justify-content:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="border:4px solid #f3f3f3; border-top:4px solid var(--red); border-radius:50%; width:45px; height:45px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top:15px; font-size:14px; font-weight:bold;">Processando vídeo...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <div id="login-ui">
        <div style="position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999;">
            <div style="width: 85%; max-width: 340px; background: #111; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #333;">
                <h1 style="color:var(--red);">CLONEFLIX</h1>
                <div id="login-status" style="font-size: 12px; margin-bottom: 10px; color: var(--yellow);">Iniciando...</div>
                <input type="text" id="user" placeholder="Usuário" class="input-adm">
                <input type="password" id="pass" placeholder="Senha" class="input-adm">
                <button onclick="autenticar()" style="width:100%; padding:12px; background:var(--red); color:#fff; border:none; border-radius:5px; font-weight:bold;">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="sticky-top">
            <header>
                <div class="header-top">
                    <div class="logo">CLONEFLIX</div>
                    <div class="nav-btns">
                        <button onclick="abrirADM()" id="adm-btn" style="display:none; background:var(--red); border:none; color:#fff; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold;">ADM</button>
                        <button onclick="logout()" class="btn-logout">SAIR</button>
                    </div>
                </div>
                <div id="welcome-msg" class="welcome-center"></div>
            </header>
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="O que vamos assistir hoje?" oninput="executarBusca(this.value)">
            </div>
            <div class="secao-container">
                <button class="btn-secao active" onclick="mudarSecao('live', this)">CANAIS</button>
                <button class="btn-secao" onclick="mudarSecao('movie', this)">FILMES</button>
                <button class="btn-secao" onclick="mudarSecao('series', this)">SÉRIES</button>
                <button class="btn-secao" onclick="mostrarFavoritos(this)" style="color:var(--yellow)">★ LISTA</button>
            </div>
        </div>
        <div id="conteudo-principal"></div>
    </div>

    <div id="modal-adm" class="modal">
        <span class="close-modal" onclick="fecharModais()">✕</span>
        <h3 style="color:var(--red)">ADM</h3>
        <div style="background:#111; padding:15px; border-radius:8px; border:1px solid var(--red);">
            <input type="text" id="adm-url" placeholder="URL" class="input-adm">
            <input type="text" id="adm-u" placeholder="Usuário" class="input-adm">
            <input type="text" id="adm-p" placeholder="Senha" class="input-adm">
            <button onclick="salvarConfigServidor()" style="width:100%; padding:10px; background:#27ae60; border:none; border-radius:5px; color:white;">SALVAR IPTV</button>
        </div>
        <div id="lista-usuarios-adm" style="margin-top:15px;"></div>
    </div>

    <div id="modal-detalhes" class="modal"><span class="close-modal" onclick="fecharModais()">✕</span><div id="detalhes-body" style="text-align:center; max-width:500px; margin:40px auto;"></div></div>
    
    <div id="player-box">
        <span class="close-modal" onclick="fecharPlayer()" style="left:15px; top:15px; background:rgba(0,0,0,0.6); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;">✕</span>
        <video id="vid" class="video-js vjs-fill vjs-big-play-centered" controls playsinline preload="auto"></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var API = { url: "http://lunnabr1.site", u: "35215954", p: "54642513" }; 
        const FIREBASE = "https://cloneflix-16f9c-default-rtdb.firebaseio.com";
        const DB = `${FIREBASE}/usuarios`;

        var player = videojs('vid', { 
            fluid: true, 
            autoplay: false,
            html5: { hls: { overrideNative: true }, nativeVideoTracks: false }
        });

        var fullData = {};
        var currentLogged = {};
        var secaoAtual = 'live';

        window.onload = async () => {
            await carregarConfiguracoes();
            const saved = localStorage.getItem('clone_creds');
            if(saved) {
                const c = JSON.parse(saved);
                document.getElementById('user').value = c.u;
                document.getElementById('pass').value = c.p;
                autenticar(true);
            }
        };

        async function carregarConfiguracoes() {
            try {
                const res = await fetch(`${FIREBASE}/config.json`).then(r => r.json());
                if(res && res.server) API = res.server;
            } catch(e) {}
        }

        async function autenticar(isAuto = false) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return;
            if(u === "Rhuan" && p === "270412") { currentLogged = { user: "Rhuan", adm: true, favs: [] }; entrar(); return; }
            
            const res = await fetch(`${DB}.json`).then(r => r.json());
            for(let id in res) {
                const user = res[id];
                if(user.user === u && user.pass === p) {
                    localStorage.setItem('clone_creds', JSON.stringify({u, p}));
                    currentLogged = user; currentLogged.id = id; entrar(); return;
                }
            }
            if(!isAuto) alert("Login inválido.");
        }

        function entrar() {
            document.getElementById('login-ui').style.display='none';
            document.getElementById('app-ui').style.display='block';
            if(currentLogged.adm) document.getElementById('adm-btn').style.display='block';
            const exp = currentLogged.expira ? new Date(currentLogged.expira).toLocaleDateString() : "Vitalício";
            document.getElementById('welcome-msg').innerHTML = `Olá, <b>${currentLogged.user}</b> | Vencimento: <b>${exp}</b>`;
            mudarSecao('live');
        }

        async function mudarSecao(tipo, btn) {
            secaoAtual = tipo;
            if(btn) { document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const principal = document.getElementById('conteudo-principal');
            principal.innerHTML = '<div style="text-align:center; padding:50px;"><div style="border:3px solid #333; border-top:3px solid red; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:0 auto;"></div></div>';
            
            const catAct = tipo==='live'?'get_live_categories':tipo==='movie'?'get_vod_categories':'get_series_categories';
            const streamAct = tipo==='live'?'get_live_streams':tipo==='movie'?'get_vod_streams':'get_series';
            
            try {
                const [cats, streams] = await Promise.all([
                    fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${catAct}`).then(r => r.json()),
                    fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${streamAct}`).then(r => r.json())
                ]);
                fullData[tipo] = streams; 
                renderizar(cats, streams, tipo);
            } catch(e) { principal.innerHTML = '<p style="text-align:center;">Erro de conexão.</p>'; }
        }

        function renderizar(cats, streams, tipo) {
            let html = "";
            cats.slice(0, 40).forEach(cat => {
                const itens = streams.filter(s => s.category_id === cat.category_id);
                if(itens.length > 0) {
                    html += `<div class="row"><div class="row-header"><span class="row-title">${cat.category_name}</span><button class="btn-ver-mais" onclick="verMais('${cat.category_id}', '${cat.category_name}')">VER TUDO</button></div><div class="shelf">${itens.slice(0, 15).map(i => cardHtml(i, tipo)).join('')}</div></div>`;
                }
            });
            document.getElementById('conteudo-principal').innerHTML = html;
        }

        function cardHtml(i, tipo) {
            const id = i.stream_id || i.series_id;
            const isFav = (currentLogged.favs || []).some(f => f.id === String(id));
            const img = i.stream_icon || i.cover || i.img;
            return `<div class="card">
                <span class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${id}','${tipo}','${i.name.replace(/'/g, "")}','${img}')">★</span>
                <div onclick="abrirConteudo('${id}', '${tipo}')"><img loading="lazy" src="${img}" onerror="this.src='https://via.placeholder.com/150x225?text=Sem+Foto'"><div class="card-name">${i.name}</div></div>
            </div>`;
        }

        // --- NOVA LÓGICA DE PLAYER ULTRA COMPATÍVEL ---
        async function play(id, ext, tipo) {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('player-box').style.display = 'block';
            player.reset();

            const urlBase = `${API.url}/${tipo==='live'?'live':tipo==='movie'?'movie':'series'}/${API.u}/${API.p}/${id}`;
            
            // Tentativas inteligentes de extensões
            let extensionList = [];
            if(tipo === 'live') {
                extensionList = ['m3u8', 'ts', ''];
            } else {
                // Tenta extensão da API, depois mp4, depois m3u8, depois sem nada
                extensionList = [ext, 'mp4', 'm3u8', 'ts', 'mkv', ''];
            }

            // Remove duplicados e undefined
            extensionList = [...new Set(extensionList.filter(e => e !== undefined))];

            async function startAttempt(idx) {
                if (idx >= extensionList.length) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    alert("Formato não suportado por este dispositivo. Tente outro conteúdo.");
                    fecharPlayer();
                    return;
                }

                let currentExt = extensionList[idx];
                let finalUrl = currentExt ? `${urlBase}.${currentExt}` : urlBase;
                
                // Força o tipo de MIME dependendo da tentativa
                let mimeType = 'video/mp4';
                if(currentExt === 'm3u8' || tipo === 'live') mimeType = 'application/x-mpegURL';
                if(currentExt === 'ts') mimeType = 'video/mp2t';

                console.log("Tentando reproduzir via: " + finalUrl);

                player.src({ src: finalUrl, type: mimeType });
                
                player.ready(() => {
                    let promise = player.play();
                    if (promise !== undefined) {
                        promise.then(() => {
                            document.getElementById('loading-overlay').style.display = 'none';
                        }).catch(() => {
                            console.log("Falha no formato " + currentExt + ". Tentando próximo...");
                            startAttempt(idx + 1);
                        });
                    }
                });
            }

            startAttempt(0);
        }

        async function abrirConteudo(id, tipo) {
            if(tipo === 'live') return play(id, 'm3u8', 'live');
            document.getElementById('loading-overlay').style.display = 'flex';
            const action = tipo === 'series' ? 'get_series_info' : 'get_vod_info';
            const param = tipo === 'series' ? 'series_id' : 'vod_id';
            
            try {
                const res = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${action}&${param}=${id}`).then(r => r.json());
                const info = res.info || res.movie_data || {};
                const extension = info.container_extension || (res.movie_data && res.movie_data.container_extension) || 'mp4';
                
                let html = `<img src="${info.cover || info.movie_image}" style="width:180px; border-radius:8px; margin-bottom:15px; box-shadow:0 0 20px #000;"><h2>${info.name}</h2><p style="color:#aaa; font-size:13px; padding:0 20px;">${info.plot || 'Nenhuma descrição encontrada.'}</p>`;
                
                if(tipo === 'series') {
                    window.tempEps = res.episodes;
                    html += `<select class="input-adm" style="width:90%" onchange="carregarEps(this.value)"><option value="">Selecione Temporada</option>${Object.keys(res.episodes).map(s => `<option value="${s}">Temp ${s}</option>`).join('')}</select><div id="eps-box" style="max-height:280px; overflow-y:auto; margin-top:10px;"></div>`;
                } else {
                    html += `<button onclick="play('${id}','${extension}','movie')" style="width:90%; padding:15px; background:var(--red); color:white; border:none; border-radius:5px; font-weight:bold; margin-top:20px;">REPRODUZIR FILME</button>`;
                }
                document.getElementById('detalhes-body').innerHTML = html;
                document.getElementById('modal-detalhes').style.display = 'block';
            } catch(e) { alert("Erro ao carregar detalhes."); }
            finally { document.getElementById('loading-overlay').style.display = 'none'; }
        }

        function carregarEps(s) {
            if(!s || !window.tempEps[s]) return;
            document.getElementById('eps-box').innerHTML = window.tempEps[s].map(e => `
                <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:13px;">E${e.episode_num} - ${e.title}</span>
                    <button onclick="play('${e.id || e.stream_id}','${e.container_extension || 'mp4'}','series')" style="background:var(--red); border:none; color:white; padding:8px 15px; border-radius:5px;">ASSISTIR</button>
                </div>
            `).join('');
        }

        function fecharPlayer() { player.pause(); document.getElementById('player-box').style.display='none'; document.getElementById('loading-overlay').style.display='none'; }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function logout() { localStorage.clear(); location.reload(); }
        function verMais(catId, catName) { const f = fullData[secaoAtual].filter(i => i.category_id === catId); document.getElementById('conteudo-principal').innerHTML = `<div class="row-header"><button onclick="mudarSecao(secaoAtual)" style="background:none;border:none;color:white;font-size:18px;">← Voltar</button><span class="row-title">${catName}</span></div><div class="grid-view">${f.map(i => cardHtml(i, secaoAtual)).join('')}</div>`; window.scrollTo(0,0); }
        function executarBusca(q) { if(!q) return mudarSecao(secaoAtual); const res = fullData[secaoAtual].filter(i => i.name.toLowerCase().includes(q.toLowerCase())).slice(0, 40); document.getElementById('conteudo-principal').innerHTML = `<div class="grid-view">${res.map(i => cardHtml(i, secaoAtual)).join('')}</div>`; }
        async function toggleFav(e, id, t, n, img) { e.stopPropagation(); let f = currentLogged.favs || []; const idx = f.findIndex(x => x.id === String(id)); if(idx > -1) f.splice(idx, 1); else f.push({id: String(id), tipo:t, name:n, img:img}); currentLogged.favs = f; await fetch(`${DB}/${currentLogged.id}.json`, { method: 'PATCH', body: JSON.stringify({ favs: f }) }); e.target.classList.toggle('active'); }
        function mostrarFavoritos(btn) { document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); btn.classList.add('active'); const f = currentLogged.favs || []; document.getElementById('conteudo-principal').innerHTML = f.length ? `<div class="grid-view">${f.map(x => cardHtml({stream_id: x.id, name: x.name, img: x.img}, x.tipo)).join('')}</div>` : `<p style="text-align:center; padding-top:40px;">Sua lista está vazia.</p>`; }

        async function salvarConfigServidor() {
            const cfg = { url: document.getElementById('adm-url').value, u: document.getElementById('adm-u').value, p: document.getElementById('adm-p').value };
            await fetch(`${FIREBASE}/config.json`, { method: 'PUT', body: JSON.stringify({server: cfg}) });
            alert("IPTV Salvo!"); location.reload();
        }

        async function abrirADM() {
            document.getElementById('modal-adm').style.display = 'block';
            const res = await fetch(`${DB}.json`).then(r => r.json()); 
            let html = "";
            for(let id in res) {
                const u = res[id];
                html += `<div class="user-card"><b>${u.user}</b> <span style="float:right; color:#2ecc71;">Ativo</span><br><small>Exp: ${new Date(u.expira).toLocaleDateString()}</small></div>`;
            }
            document.getElementById('lista-usuarios-adm').innerHTML = html;
        }
    </script>
</body>
</html>
