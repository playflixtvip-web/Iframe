<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX ULTRA</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --red: #E50914; --bg: #000; --card-bg: #141414; --gray: #222; --yellow: #f1c40f; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 2px solid var(--red); }
        header { padding: 12px 15px 5px 15px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--red); text-transform: uppercase; }
        .welcome-center { text-align: center; font-size: 11px; color: #ccc; background: #111; padding: 8px; border-radius: 5px; margin-bottom: 5px; line-height: 1.4; }
        .welcome-center b { color: var(--red); }
        .welcome-center span { color: var(--yellow); font-weight: bold; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-logout { background: none; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .search-container { padding: 5px 15px 10px 15px; }
        .search-input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .secao-container { display: flex; gap: 8px; padding: 10px 12px 15px 12px; overflow-x: auto; scrollbar-width: none; background: var(--bg); }
        .btn-secao { padding: 8px 18px; background: var(--gray); border: none; color: #fff; border-radius: 20px; font-weight: bold; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .btn-secao.active { background: var(--red); }
        .row { padding: 5px 0; }
        .row-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 8px; }
        .row-title { font-size: 14px; font-weight: bold; }
        .btn-ver-mais { color: var(--red); font-size: 11px; font-weight: bold; background: none; border: none; cursor: pointer; }
        .shelf { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; padding: 15px; }
        .card { min-width: 105px; max-width: 150px; border-radius: 5px; overflow: hidden; background: var(--card-bg); border: 1px solid #222; position: relative; cursor: pointer; }
        .card.in-progress { border: 2px solid var(--red); }
        .badge-continue { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; font-size: 7px; padding: 2px 4px; border-radius: 2px; z-index: 15; }
        .badge-season { position: absolute; bottom: 35px; right: 5px; background: rgba(0,0,0,0.8); color: var(--yellow); font-size: 8px; padding: 2px 5px; border-radius: 3px; z-index: 15; border: 1px solid var(--yellow); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-name { padding: 5px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; text-shadow: 0 0 5px #000; cursor: pointer; z-index: 10; color: #ccc; }
        .fav-star.active { color: var(--yellow); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 15px; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 28px; color: #fff; cursor: pointer; z-index: 1001; }
        .user-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #333; font-size: 11px; }
        .btn-adm { border: none; padding: 8px; border-radius: 4px; font-size: 9px; font-weight: bold; color: #fff; cursor: pointer; }
        .input-adm { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        #player-box { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .ep-item { padding: 15px; border-bottom: 1px solid #222; text-align: left; background: #111; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
        .ep-item.highlight { border-left: 4px solid var(--red); background: #1a0a0a; }
    </style>
</head>
<body>

    <div id="login-ui">
        <div style="position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999;">
            <div style="width: 85%; max-width: 340px; background: #111; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #333;">
                <h1 style="color:var(--red); margin-bottom:5px;">CLONEFLIX</h1>
                <div id="login-status" style="font-size: 11px; margin-bottom: 15px; color: var(--yellow);">Aguardando credenciais...</div>
                <input type="text" id="user" placeholder="Usuário" class="input-adm">
                <input type="password" id="pass" placeholder="Senha" class="input-adm">
                <button onclick="autenticar()" style="width:100%; padding:15px; background:var(--red); color:#fff; border:none; border-radius:5px; font-weight:bold;">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="sticky-top">
            <header>
                <div class="header-top">
                    <div class="logo">CLONEFLIX</div>
                    <div class="nav-btns">
                        <button onclick="abrirADM()" id="adm-btn" style="display:none; background:var(--red); border:none; color:#fff; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold;">ADM</button>
                        <button onclick="logout()" class="btn-logout">SAIR</button>
                    </div>
                </div>
                <div id="welcome-msg" class="welcome-center"></div>
            </header>
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="Pesquisar conteúdo..." oninput="executarBusca(this.value)">
            </div>
            <div class="secao-container">
                <button class="btn-secao active" onclick="mudarSecao('live', this)">CANAIS</button>
                <button class="btn-secao" onclick="mudarSecao('movie', this)">FILMES</button>
                <button class="btn-secao" onclick="mudarSecao('series', this)">SÉRIES</button>
                <button class="btn-secao" onclick="mostrarFavoritos(this)" style="color:var(--yellow)">★ MINHA LISTA</button>
            </div>
        </div>
        <div id="conteudo-principal"></div>
    </div>

    <div id="modal-adm" class="modal">
        <span class="close-modal" onclick="fecharModais()">✕</span>
        <h3 style="color:var(--red); text-align:center;">PAINEL GESTOR</h3>
        <div style="background:#111; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid var(--red);">
            <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--red);">SERVIDOR IPTV</h4>
            <input type="text" id="adm-url" placeholder="URL DNS" class="input-adm">
            <input type="text" id="adm-u" placeholder="Usuário IPTV" class="input-adm">
            <input type="text" id="adm-p" placeholder="Senha IPTV" class="input-adm">
            <button onclick="salvarConfigServidor()" style="width:100%; padding:10px; background:#27ae60; color:#fff; border:none; border-radius:5px; font-weight:bold;">ATUALIZAR DNS</button>
        </div>
        <div id="adm-form" style="background:#111; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #444;">
            <h4 style="margin:0 0 10px 0; font-size:12px;">GERENCIAR ACESSO</h4>
            <input type="hidden" id="edit-id"><input type="hidden" id="old-exp">
            <input type="text" id="new-u" placeholder="Login" class="input-adm">
            <input type="text" id="new-p" placeholder="Senha" class="input-adm">
            <input type="number" id="new-days" placeholder="Dias de acesso" class="input-adm">
            <input type="number" id="new-screens" placeholder="Limite de Telas" class="input-adm" value="1">
            <button onclick="salvarUsuario()" id="btn-save-adm" style="width:100%; padding:12px; background:var(--red); color:#fff; border:none; border-radius:5px; font-weight:bold;">SALVAR CLIENTE</button>
        </div>
        <div id="lista-usuarios-adm"></div>
    </div>

    <div id="modal-detalhes" class="modal"><span class="close-modal" onclick="fecharModais()">✕</span><div id="detalhes-body" style="text-align:center; max-width:500px; margin:40px auto; padding-bottom:50px;"></div></div>
    
    <div id="modal-escolha-ep" class="modal" style="z-index: 1100; background: rgba(0,0,0,0.95);"><span class="close-modal" onclick="fecharModalEscolha()">✕</span><div id="escolha-body" style="text-align:center; margin-top:30vh; padding:20px;"></div></div>

    <div id="player-box"><span class="close-modal" onclick="fecharPlayer()" style="left:15px; top:15px;">✕</span><video id="vid" class="video-js vjs-fill vjs-big-play-centered" controls></video></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var API = { url: "http://lunnabr1.site", u: "35215954", p: "54642513" }; 
        const FIREBASE = "https://cloneflix-16f9c-default-rtdb.firebaseio.com";
        const DB = `${FIREBASE}/usuarios`;
        
        var player = videojs('vid');
        var fullData = {}; var currentLogged = {}; var secaoAtual = 'live'; var saveInterval = null;
        var relogioInterval = null;
        var wakeLock = null; 
        var currentPlayingId = null;
        var currentPlayingType = null;
        var currentSeriesParent = null;
        var currentSeason = null;
        var monitorSessaoInterval = null;

        function obterDeviceId() {
            let id = localStorage.getItem('clone_device_id');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + Date.now();
                localStorage.setItem('clone_device_id', id);
            }
            return id;
        }

        window.onload = async () => {
            await carregarConfigServidor();
            const saved = localStorage.getItem('clone_creds');
            if(saved) {
                const c = JSON.parse(saved);
                document.getElementById('user').value = c.u;
                document.getElementById('pass').value = c.p;
                autenticar(true);
            }
        };

        async function solicitarWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function liberarWakeLock() {
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
        }

        async function carregarConfigServidor() {
            try {
                const res = await fetch(`${FIREBASE}/config.json`).then(r => r.json());
                if(res && res.server) API = res.server;
            } catch(e) {}
        }

        async function autenticar(isAuto = false) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const statusDiv = document.getElementById('login-status');
            const deviceId = obterDeviceId();

            if(!u || !p) return;

            if(u === "Rhuan" && p === "270412") { 
                currentLogged = { user: "Rhuan", adm: true, id: "admin", history: {}, favs: [], screens: 99, expira: 4102444800000 }; 
                entrar(); return; 
            }

            statusDiv.innerText = "Verificando...";
            try {
                const res = await fetch(`${DB}.json`).then(r => r.json());
                let found = false;
                for(let id in res) {
                    const user = res[id];
                    if(user.user === u && user.pass === p) {
                        found = true;
                        
                        if(user.status === 'bloqueado' || user.status === 'suspenso') {
                            statusDiv.innerText = "ACESSO BLOQUEADO!";
                            return alert("Sua conta está BLOQUEADA ou SUSPENSA!");
                        }
                        if(user.expira && user.expira < Date.now()) {
                            statusDiv.innerText = "ACESSO VENCIDO!";
                            return alert("Seu acesso VENCEU!");
                        }

                        // AJUSTE DE LIMITE DE TELAS: Garante que a lista de aparelhos seja um Array
                        let aparelhos = Array.isArray(user.active_devices) ? user.active_devices : [];
                        
                        if (!aparelhos.includes(deviceId)) {
                            if (aparelhos.length >= (user.screens || 1)) {
                                statusDiv.innerText = "LIMITE DE TELAS ATINGIDO!";
                                return alert("Limite de telas atingido! Saia de outro aparelho primeiro.");
                            }
                            aparelhos.push(deviceId);
                            await fetch(`${DB}/${id}.json`, { 
                                method: 'PATCH', 
                                body: JSON.stringify({ 
                                    active_devices: aparelhos,
                                    online_count: aparelhos.length 
                                }) 
                            });
                        }

                        currentLogged = user; 
                        currentLogged.id = id;
                        currentLogged.active_devices = aparelhos;
                        
                        localStorage.setItem('clone_creds', JSON.stringify({u, p}));
                        entrar(); break;
                    }
                }
                if(!found && !isAuto) statusDiv.innerText = "Usuário ou senha incorretos!";
            } catch(e) { statusDiv.innerText = "Erro ao conectar."; }
        }

        function entrar() { 
            document.getElementById('login-ui').style.display='none'; 
            document.getElementById('app-ui').style.display='block'; 
            if(currentLogged.adm) document.getElementById('adm-btn').style.display='block';
            const venc = currentLogged.expira ? new Date(currentLogged.expira).toLocaleDateString() : "Vitalício";
            
            if(relogioInterval) clearInterval(relogioInterval);
            atualizarRelogio(venc);
            relogioInterval = setInterval(() => atualizarRelogio(venc), 1000);

            if(monitorSessaoInterval) clearInterval(monitorSessaoInterval);
            monitorSessaoInterval = setInterval(verificarSessaoAtiva, 20000);

            mudarSecao('live'); 
        }

        async function verificarSessaoAtiva() {
            if (!currentLogged.id || currentLogged.id === "admin") return;
            try {
                const res = await fetch(`${DB}/${currentLogged.id}.json`).then(r => r.json());
                const deviceId = obterDeviceId();
                // Se o ADM resetou, res.active_devices virá null ou vazio
                if (!res || res.status === 'bloqueado' || !res.active_devices || !res.active_devices.includes(deviceId)) {
                    forceLogout();
                }
            } catch (e) {}
        }

        function forceLogout() {
            localStorage.removeItem('clone_creds');
            location.reload();
        }

        function atualizarRelogio(vencimento) {
            const agora = new Date();
            const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            document.getElementById('welcome-msg').innerHTML = `
                Olá, <b>${currentLogged.user}</b> | Vence em: <span>${vencimento}</span><br>
                <small style="color:#888; font-size:10px;">${diasSemana[agora.getDay()]}, ${agora.toLocaleDateString()} - ${agora.toLocaleTimeString()}</small>
            `;
        }

        async function mudarSecao(tipo, btn) {
            secaoAtual = tipo;
            if(btn) { document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const principal = document.getElementById('conteudo-principal');
            principal.innerHTML = '<p style="text-align:center;padding:30px;color:var(--red);">Carregando biblioteca...</p>';
            const catAct = tipo==='live'?'get_live_categories':tipo==='movie'?'get_vod_categories':'get_series_categories';
            const streamAct = tipo==='live'?'get_live_streams':tipo==='movie'?'get_vod_streams':'get_series';
            try {
                const cats = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${catAct}`).then(r => r.json());
                const streams = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${streamAct}`).then(r => r.json());
                fullData[tipo] = streams; renderizar(cats, streams, tipo);
            } catch(e) { principal.innerHTML = '<p style="text-align:center;">Erro ao carregar IPTV.</p>'; }
        }

        function renderizar(cats, streams, tipo) {
            let html = ""; const history = currentLogged.history || {}; const continueWatching = [];
            for(let id in history) {
                if(history[id].tipo === tipo) {
                    let item = (tipo === 'series') ? streams.find(s => String(s.series_id) === String(history[id].seriesParentId)) : streams.find(s => String(s.stream_id) === id);
                    if(item && !continueWatching.some(x => (x.series_id || x.stream_id) === (item.series_id || item.stream_id))) continueWatching.push(item);
                }
            }
            if(continueWatching.length > 0) {
                html += `<div class="row">
                    <div class="row-header">
                        <span class="row-title" style="color:var(--yellow)">CONTINUAR ASSISTINDO</span>
                        <button class="btn-ver-mais" onclick="verMaisHistorico('${tipo}')">VER MAIS</button>
                    </div>
                    <div class="shelf">${continueWatching.slice(0, 8).map(i => cardHtml(i, tipo)).join('')}</div>
                </div>`;
            }
            cats.slice(0, 30).forEach(cat => {
                const itens = streams.filter(s => s.category_id === cat.category_id);
                if(itens.length > 0) html += `<div class="row"><div class="row-header"><span class="row-title">${cat.category_name}</span><button class="btn-ver-mais" onclick="verMais('${cat.category_id}', '${cat.category_name}')">VER MAIS</button></div><div class="shelf">${itens.slice(0, 8).map(i => cardHtml(i, tipo)).join('')}</div></div>`;
            });
            document.getElementById('conteudo-principal').innerHTML = html;
        }

        function verMaisHistorico(tipo) {
            const streams = fullData[tipo];
            const history = currentLogged.history || {};
            const continueWatching = [];
            for(let id in history) {
                if(history[id].tipo === tipo) {
                    let item = (tipo === 'series') ? streams.find(s => String(s.series_id) === String(history[id].seriesParentId)) : streams.find(s => String(s.stream_id) === id);
                    if(item && !continueWatching.some(x => (x.series_id || x.stream_id) === (item.series_id || item.stream_id))) continueWatching.push(item);
                }
            }
            document.getElementById('conteudo-principal').innerHTML = `<div class="row-header" style="padding:15px;"><button onclick="mudarSecao(secaoAtual)" style="background:none;border:none;color:white;font-size:20px;">←</button><span class="row-title">CONTINUAR ASSISTINDO</span></div><div class="grid-view">${continueWatching.map(i => cardHtml(i, tipo)).join('')}</div>`;
            window.scrollTo(0,0);
        }

        function cardHtml(i, tipo) {
            const id = String(i.stream_id || i.series_id);
            const isFav = (currentLogged.favs || []).some(f => f.id === id);
            const history = currentLogged.history || {};
            let inProgress = false; let seasonTag = "";
            if (tipo === 'series') {
                const hist = Object.values(history).find(h => String(h.seriesParentId) === id);
                if(hist) { inProgress = true; seasonTag = `<span class="badge-season">T${hist.season}</span>`; }
            } else if(history[id]) inProgress = true;
            const imgUrl = i.stream_icon || i.cover || i.img;
            return `<div class="card ${inProgress?'in-progress':''}">
                ${inProgress ? '<span class="badge-continue">CONTINUAR</span>' : ''}
                ${seasonTag}
                <span class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, '${id}','${tipo}','${i.name.replace(/'/g, "")}','${imgUrl}')">★</span>
                <div onclick="abrirConteudo('${id}', '${tipo}')">
                    <img loading="lazy" src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225?text=Sem+Foto'">
                    <div class="card-name">${i.name}</div>
                </div>
            </div>`;
        }

        async function abrirConteudo(id, tipo) { 
            if(tipo === 'live') return play(id, 'm3u8', 'live'); 
            const res = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${tipo==='series'?'get_series_info':'get_vod_info'}&${tipo==='series'?'series_id':'vod_id'}=${id}`).then(r => r.json()); 
            const info = res.info || res.movie_data; 
            let html = `<img src="${info.cover || info.movie_image}" style="width:160px; border-radius:8px;"><h2>${info.name}</h2><p style="font-size:12px; color:#aaa; padding:0 15px;">${info.plot || ''}</p>`;
            if(tipo === 'series') { 
                window.tempEps = res.episodes;
                const hist = Object.values(currentLogged.history || {}).find(h => String(h.seriesParentId) === id);
                const lastS = hist ? hist.season : Object.keys(res.episodes)[0];
                html += `<select id="season-select" class="input-adm" onchange="carregarEps(this.value, '${id}')">
                    ${Object.keys(res.episodes).map(s => `<option value="${s}" ${s==lastS?'selected':''}>Temporada ${s}</option>`).join('')}
                </select><div id="eps-box" style="margin-top:10px; max-height:300px; overflow-y:auto;"></div>`; 
                setTimeout(() => carregarEps(lastS, id), 100);
            } else {
                const hist = (currentLogged.history || {})[id];
                const ext = info.container_extension || 'mp4';
                if(hist) {
                    html += `<button onclick="play('${id}','${ext}','movie', ${hist.time})" style="width:90%; padding:15px; background:var(--red); color:#fff; border:none; font-weight:bold; border-radius:5px; margin-bottom:10px;">RETOMAR EM ${Math.floor(hist.time/60)}m</button>
                             <button onclick="play('${id}','${ext}','movie', 0)" style="width:90%; padding:10px; background:#333; color:#fff; border:none; border-radius:5px;">DO INÍCIO</button>`;
                } else {
                    html += `<button onclick="play('${id}','${ext}','movie')" style="width:90%; padding:15px; background:var(--red); color:#fff; border:none; font-weight:bold; border-radius:5px;">ASSISTIR AGORA</button>`;
                }
            } 
            document.getElementById('detalhes-body').innerHTML = html; document.getElementById('modal-detalhes').style.display = 'block'; 
        }

        function carregarEps(s, seriesId) { 
            if(!s || !window.tempEps[s]) return; 
            document.getElementById('eps-box').innerHTML = window.tempEps[s].map(e => {
                const epId = String(e.id || e.stream_id);
                const hist = (currentLogged.history || {})[epId];
                return `<div class="ep-item ${hist?'highlight':''}" onclick="prepararEp('${epId}','${e.container_extension||'mp4'}','${seriesId}','${s}','${e.title.replace(/'/g, "")}')">
                    <span style="font-size:12px; font-weight:bold;">E${e.episode_num} - ${e.title}</span>
                    ${hist ? `<br><span style="font-size:9px; color:var(--yellow)">PAROU EM ${Math.floor(hist.time/60)}m</span>` : ''}
                </div>`;
            }).join(''); 
        }

        function prepararEp(epId, ext, seriesId, season, title) {
            const hist = (currentLogged.history || {})[epId];
            if(hist) {
                document.getElementById('escolha-body').innerHTML = `<h3>${title}</h3>
                <button onclick="fecharModalEscolha(); play('${epId}','${ext}','series', ${hist.time}, '${seriesId}', '${season}')" style="width:100%; padding:15px; background:var(--red); color:#fff; border:none; font-weight:bold; border-radius:5px; margin-bottom:10px;">RETOMAR</button>
                <button onclick="fecharModalEscolha(); play('${epId}','${ext}','series', 0, '${seriesId}', '${season}')" style="width:100%; padding:12px; background:#333; color:#fff; border:none; border-radius:5px;">DO INÍCIO</button>`;
                document.getElementById('modal-escolha-ep').style.display = 'block';
            } else play(epId, ext, 'series', 0, seriesId, season);
        }

        function fecharModalEscolha() { document.getElementById('modal-escolha-ep').style.display = 'none'; }

        async function play(id, ext, tipo, startTime = 0, seriesParentId = null, seasonNum = null) {
            currentPlayingId = id; currentPlayingType = tipo; currentSeriesParent = seriesParentId; currentSeason = seasonNum;
            let url = (tipo === 'live') ? `${API.url}/live/${API.u}/${API.p}/${id}.m3u8` : (tipo === 'movie') ? `${API.url}/movie/${API.u}/${API.p}/${id}.${ext||'mp4'}` : `${API.url}/series/${API.u}/${API.p}/${id}.${ext||'mp4'}`;
            
            await solicitarWakeLock();
            document.getElementById('player-box').style.display = 'block';
            player.src({ src: url, type: tipo==='live'?'application/x-mpegURL':'video/mp4' });
            
            player.ready(() => { 
                if(startTime > 0) player.currentTime(startTime); 
                player.play(); 
                if(tipo !== 'live') {
                    if(saveInterval) clearInterval(saveInterval);
                    saveInterval = setInterval(() => salvarProgressoFirebase(), 8000);
                }
            });
        }

        async function salvarProgressoFirebase() {
            if(!currentPlayingId || currentPlayingType === 'live') return;
            const time = Math.floor(player.currentTime());
            const duration = player.duration();
            if(!duration || isNaN(duration)) return;
            
            if(!currentLogged.history) currentLogged.history = {};
            const percent = (time / duration) * 100;

            if (time < 10) return;

            if (percent >= 90) {
                if (currentLogged.history[currentPlayingId]) {
                    delete currentLogged.history[currentPlayingId];
                    await fetch(`${DB}/${currentLogged.id}/history.json`, { method: 'PUT', body: JSON.stringify(currentLogged.history) });
                }
            } else {
                currentLogged.history[currentPlayingId] = { time, tipo: currentPlayingType, seriesParentId: currentSeriesParent, season: currentSeason };
                await fetch(`${DB}/${currentLogged.id}/history.json`, { method: 'PUT', body: JSON.stringify(currentLogged.history) });
            }
        }

        async function fecharPlayer() { 
            if(currentPlayingType !== 'live') await salvarProgressoFirebase();
            if(saveInterval) clearInterval(saveInterval);
            player.pause(); 
            liberarWakeLock();
            document.getElementById('player-box').style.display='none'; 
            mudarSecao(secaoAtual);
        }

        async function abrirADM() {
            document.getElementById('modal-adm').style.display = 'block';
            const res = await fetch(`${DB}.json`).then(r => r.json());
            let html = "";
            for(let id in res) {
                const u = res[id];
                const ativos = Array.isArray(u.active_devices) ? u.active_devices.length : 0;
                html += `<div class="user-card">
                    <b>${u.user} (${u.pass})</b> <span style="float:right; color:${u.status==='bloqueado'?'red':'green'}">${u.status||'ativo'}</span><br>
                    Telas: ${ativos}/${u.screens||1} | Vence: ${u.expira?new Date(u.expira).toLocaleDateString():'N/A'}<br><br>
                    <button class="btn-adm" style="background:#2980b9" onclick="prepararEdicao('${id}','${u.user}','${u.pass}','${u.screens}','${u.expira}')">Editar</button>
                    <button class="btn-adm" style="background:#8e44ad" onclick="resetarTelas('${id}')">Reset Telas</button>
                    <button class="btn-adm" style="background:#d35400" onclick="toggleStatus('${id}','${u.status}')">Bloq/Lib</button>
                    <button class="btn-adm" style="background:#c0392b" onclick="excluirUser('${id}')">Excluir</button>
                </div>`;
            }
            document.getElementById('lista-usuarios-adm').innerHTML = html;
        }

        async function resetarTelas(id) {
            if(confirm("Deseja desconectar todos os aparelhos?")) {
                await fetch(`${DB}/${id}.json`, { 
                    method: 'PATCH', 
                    body: JSON.stringify({ 
                        active_devices: [],
                        online_count: 0 
                    }) 
                });
                alert("Telas liberadas!");
                abrirADM();
            }
        }

        async function logout() {
            if (currentLogged && currentLogged.id !== "admin") {
                try {
                    const deviceId = obterDeviceId();
                    const res = await fetch(`${DB}/${currentLogged.id}.json`).then(r => r.json());
                    let aparelhos = (res && Array.isArray(res.active_devices)) ? res.active_devices : [];
                    aparelhos = aparelhos.filter(id => id !== deviceId);
                    await fetch(`${DB}/${currentLogged.id}.json`, { 
                        method: 'PATCH', 
                        body: JSON.stringify({ 
                            active_devices: aparelhos,
                            online_count: aparelhos.length 
                        }) 
                    });
                } catch(e) {}
            }
            localStorage.removeItem('clone_creds'); 
            location.reload(); 
        }

        async function salvarUsuario() {
            const id = document.getElementById('edit-id').value;
            const days = parseInt(document.getElementById('new-days').value) || 0;
            const expFinal = days > 0 ? Date.now() + (days * 86400000) : (id ? parseInt(document.getElementById('old-exp').value) : Date.now() + (30 * 86400000));
            const user = { 
                user: document.getElementById('new-u').value, pass: document.getElementById('new-p').value, 
                screens: parseInt(document.getElementById('new-screens').value) || 1, expira: expFinal, status: 'ativo'
            };
            await fetch(id ? `${DB}/${id}.json` : `${DB}.json`, { method: id?'PATCH':'POST', body: JSON.stringify(user) });
            limparFormADM(); abrirADM();
        }

        async function toggleStatus(id, s) { await fetch(`${DB}/${id}.json`, { method: 'PATCH', body: JSON.stringify({ status: s==='bloqueado'?'ativo':'bloqueado' }) }); abrirADM(); }
        async function excluirUser(id) { if(confirm("Excluir?")) { await fetch(`${DB}/${id}.json`, { method: 'DELETE' }); abrirADM(); } }
        function prepararEdicao(id, u, p, s, exp) { 
            document.getElementById('edit-id').value = id; document.getElementById('new-u').value = u; 
            document.getElementById('new-p').value = p; document.getElementById('new-screens').value = s; 
            document.getElementById('old-exp').value = exp; document.getElementById('btn-save-adm').innerText = "ATUALIZAR";
        }
        function limparFormADM() { document.getElementById('edit-id').value = ""; document.getElementById('new-u').value = ""; document.getElementById('new-p').value = ""; document.getElementById('btn-save-adm').innerText = "SALVAR CLIENTE"; }
        function executarBusca(q) { if(!q) return mudarSecao(secaoAtual); const res = fullData[secaoAtual].filter(i => i.name.toLowerCase().includes(q.toLowerCase())).slice(0, 40); document.getElementById('conteudo-principal').innerHTML = `<div class="grid-view">${res.map(i => cardHtml(i, secaoAtual)).join('')}</div>`; }
        async function toggleFav(event, id, tipo, name, img) { event.stopPropagation(); let f = currentLogged.favs || []; const idx = f.findIndex(x => x.id === String(id)); if(idx > -1) { f.splice(idx, 1); event.target.classList.remove('active'); } else { f.push({id: String(id), tipo, name, img}); event.target.classList.add('active'); } currentLogged.favs = f; await fetch(`${DB}/${currentLogged.id}/favs.json`, { method: 'PUT', body: JSON.stringify(f) }); }
        function mostrarFavoritos(btn) { document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); btn.classList.add('active'); const f = currentLogged.favs || []; document.getElementById('conteudo-principal').innerHTML = `<div class="grid-view">${f.map(x => cardHtml({stream_id: x.id, series_id: x.id, name: x.name, img: x.img}, x.tipo)).join('')}</div>`; }
        function verMais(catId, catName) { const f = fullData[secaoAtual].filter(i => i.category_id === catId); document.getElementById('conteudo-principal').innerHTML = `<div class="row-header" style="padding:15px;"><button onclick="mudarSecao(secaoAtual)" style="background:none;border:none;color:white;font-size:20px;">←</button><span class="row-title">${catName}</span></div><div class="grid-view">${f.map(i => cardHtml(i, secaoAtual)).join('')}</div>`; window.scrollTo(0,0); }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
