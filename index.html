<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0b0b0b; --red: #E50914; --card: #141414; --text: #fff; --border: #222; --yellow: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; align-items: center; padding: 0 15px; z-index: 1000; justify-content: space-between; box-sizing: border-box; }
        .logo { color: var(--red); font-weight: bold; font-size: 22px; letter-spacing: -1px; }
        .btn-voltar { background: #2a2a2a; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-red { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .user-validade { font-size: 10px; color: var(--yellow); font-weight: bold; text-align: right; line-height: 1.2; }

        #portal-inicio { display: none; padding: 80px 20px 20px; text-align: center; min-height: 100vh; box-sizing: border-box; }
        .grid-portal { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        .btn-portal { background: linear-gradient(45deg, #141414, #222); border: 2px solid #333; border-radius: 15px; padding: 40px 20px; color: white; font-size: 24px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-portal:active { transform: scale(0.95); border-color: var(--red); }

        .section-divider { margin: 30px 15px 10px; padding: 5px 0; border-bottom: 2px solid var(--red); display: inline-block; font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; }
        .row { margin: 10px 0 30px 15px; }
        .row-header { display: flex; justify-content: space-between; align-items: center; padding-right: 15px; margin-bottom: 10px; }
        .row-title { font-size: 16px; font-weight: bold; color: #e5e5e5; }
        .row-posters { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .row-posters::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 auto; width: 110px; border-radius: 4px; overflow: hidden; cursor: pointer; background: var(--card); border: 1px solid #222; position: relative; transition: 0.2s; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-title { 
            font-size: 11px; padding: 6px 5px; text-align: center; color: #fff; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; white-space: normal; height: 32px;
        }

        #player-area { width: 100%; background: #000; position: sticky; top: 60px; z-index: 900; display: none; border-bottom: 2px solid var(--red); }
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        video, iframe { width: 100%; height: 100%; display: block; border: none; }

        .player-nav { display: flex; justify-content: space-between; padding: 10px; background: #111; gap: 5px; }
        .list-epis-player { background: #000; max-height: 200px; overflow-y: auto; padding: 10px; border-top: 1px solid #222; display: none; }
        .epi-item-player { padding: 12px; border-bottom: 1px solid #222; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        .epi-item-player.active { color: var(--red); font-weight: bold; background: #111; }

        .container-box { background: var(--card); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .tabela-container { overflow-x: auto; background: #0c0c0c; border-radius: 8px; max-height: 350px; overflow-y: auto; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #222; white-space: nowrap; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; overflow-y: auto; }
        .folder-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--red); cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }

        #modal-info { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; overflow-y: auto; }
        .info-capa-bg { width: 100%; height: 40vh; background-size: cover; background-position: center; position: relative; }
        .info-capa-bg::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, #000, transparent); }
        .info-content { padding: 20px; position: relative; margin-top: -50px; }
        
        #tela-bloqueio { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="tela-bloqueio">
        <h1 style="color:var(--red);">SESSÃO ENCERRADA</h1>
        <p>Login detectado em outro aparelho.</p>
        <button class="btn-red" onclick="location.reload()">VOLTAR</button>
    </div>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div class="container-box" style="width: 85%; max-width: 350px; text-align: center;">
            <h1 style="color:var(--red);">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="btn-entrar" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-content" style="display:none; padding-top: 60px;">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn-voltar" id="btn-portal-back" style="display:none" onclick="voltarAoPortal()">← INÍCIO</button>
                <div class="logo">CLONEFLIX</div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <div id="display-validade" class="user-validade"></div>
                <button id="b-a" class="btn-red" style="display:none;">ADM</button>
                <button class="btn-voltar" onclick="location.reload()">SAIR</button>
            </div>
        </header>

        <div id="portal-inicio">
            <div class="grid-portal">
                <button class="btn-portal" onclick="filtrarPortal('filme')">🎬 FILMES</button>
                <button class="btn-portal" onclick="filtrarPortal('serie')">🍿 SÉRIES</button>
            </div>
        </div>

        <div id="conteudo-app" style="display: none;">
            <div id="player-area">
                <div class="player-wrapper">
                    <video id="main-video" controls playsinline></video>
                    <iframe id="main-iframe" style="display:none;" allowfullscreen></iframe>
                </div>
                <div class="player-nav">
                    <button class="btn-voltar" id="btn-prev-epi" style="display:none;">⏮</button>
                    <button class="btn-voltar" id="btn-next-epi" style="display:none;">⏭</button>
                    <button class="btn-voltar" onclick="fecharPlayer()" style="background:var(--red)">FECHAR</button>
                </div>
                <div id="lista-epis-inline" class="list-epis-player"></div>
            </div>
            <div style="padding: 15px;"><input type="text" id="busca-user" placeholder="🔍 Buscar..."></div>
            <div id="conteudo-home"></div>
            <div id="view-detalhe" style="display: none;">
                <button class="btn-voltar" style="margin: 15px;" onclick="this.parentElement.style.display='none'; document.getElementById('conteudo-home').style.display='block';">← VOLTAR</button>
                <div id="grid-itens" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; padding: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel" style="display: none; padding: 20px; background: #000; min-height: 100vh; padding-top: 80px;">
        <button class="btn-voltar" id="btn-voltar-adm">← VOLTAR AO APP</button>
        <div class="container-box">
            <h3>ADM CONTEÚDO</h3>
            <input type="hidden" id="edit-id-cont">
            <input id="c-nome" placeholder="Nome">
            <select id="c-tipo"><option value="filme">FILME</option><option value="serie">SÉRIE</option></select>
            <input id="c-cat" placeholder="Categoria">
            <textarea id="c-links" placeholder="Links ou Iframe"></textarea>
            <input id="c-capa" placeholder="URL Capa">
            <button class="btn-red" id="btn-salvar-db">SALVAR</button>
            <div class="tabela-container"><table id="tabela-conteudo-adm"></table></div>
        </div>
    </div>

    <div id="modal-temp" class="modal"><div id="temp-lista"></div><button class="btn-voltar" onclick="this.parentElement.style.display='none'">FECHAR</button></div>
    <div id="modal-epis" class="modal"><div id="epis-lista"></div><button class="btn-voltar" onclick="this.parentElement.style.display='none'">VOLTAR</button></div>
    <div id="modal-info" class="modal">
        <div class="info-capa-bg" id="info-bg"></div>
        <div class="info-content">
            <h2 id="info-titulo"></h2>
            <button class="btn-red" id="btn-info-play">▶ ASSISTIR</button>
            <button class="btn-voltar" onclick="document.getElementById('modal-info').style.display='none'">FECHAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", 
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);
        
        let bancoDados = []; 
        const video = document.getElementById('main-video');
        const iframe = document.getElementById('main-iframe');
        let hls = null;
        let idUsuarioLogado = null;
        let idSessaoLocal = Math.random().toString(36).substring(7);

        // FUNÇÃO DE LOGIN CORRIGIDA
        document.getElementById('btn-entrar').onclick = async () => {
            const u = document.getElementById('u-l').value; 
            const p = document.getElementById('p-l').value;

            if(u === "Rhuan" && p === "2026") { 
                idUsuarioLogado = "admin";
                document.getElementById('b-a').style.display='block';
                logar();
                return;
            }

            const snap = await get(ref(db, 'usuarios'));
            let userEnc = null;
            snap.forEach(c => { 
                const d = c.val(); 
                if(d.user === u && d.pass === p) userEnc = {...d, id: c.key}; 
            });

            if(userEnc) {
                if(userEnc.expira < Date.now() && userEnc.expira !== 999) { alert("Expirado!"); return; }
                idUsuarioLogado = userEnc.id;
                logar();
            } else {
                alert("Dados incorretos!");
            }
        };

        function logar() {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            document.getElementById('portal-inicio').style.display='block';
            carregarDados();
        }

        function carregarDados() {
            onValue(ref(db, 'conteudo'), (s) => {
                bancoDados = [];
                s.forEach(it => { bancoDados.push({...it.val(), id: it.key}); });
                renderHome();
                renderADM();
            });
        }

        window.iniciarPlayer = (urlBruta, nome, lista = [], index = 0) => {
            let url = urlBruta.includes('|') ? urlBruta.split('|')[1].trim() : urlBruta.trim();
            document.getElementById('player-area').style.display = 'block';

            // LÓGICA IFRAME
            if (url.includes('<iframe') || url.includes('embed') || url.includes('youtube.com')) {
                video.style.display = 'none';
                video.pause();
                iframe.style.display = 'block';
                if(url.includes('<iframe')) {
                    const tmp = document.createElement('div');
                    tmp.innerHTML = url;
                    iframe.src = tmp.querySelector('iframe').src;
                } else {
                    iframe.src = url;
                }
            } else {
                iframe.style.display = 'none';
                iframe.src = "";
                video.style.display = 'block';
                if(hls) hls.destroy();
                if(Hls.isSupported()){
                    hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else { video.src = url; video.play(); }
            }
            window.scrollTo(0,0);
        };

        window.fecharPlayer = () => {
            document.getElementById('player-area').style.display = 'none';
            video.pause();
            iframe.src = "";
        };

        // FUNÇÕES DE NAVEGAÇÃO
        window.filtrarPortal = (tipo) => {
            document.getElementById('portal-inicio').style.display = 'none';
            document.getElementById('conteudo-app').style.display = 'block';
            document.getElementById('btn-portal-back').style.display = 'block';
            renderHome(tipo);
        };

        window.voltarAoPortal = () => {
            document.getElementById('portal-inicio').style.display = 'block';
            document.getElementById('conteudo-app').style.display = 'none';
            document.getElementById('btn-portal-back').style.display = 'none';
            fecharPlayer();
        };

        function renderHome(filtro = null) {
            const cont = document.getElementById('conteudo-home');
            cont.innerHTML = "";
            const itens = filtro ? bancoDados.filter(i => i.tipo === filtro) : bancoDados;
            
            const cats = [...new Set(itens.map(i => i.categoria))];
            cats.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<div class="row-header"><span class="row-title">${cat}</span></div><div class="row-posters"></div>`;
                const postCont = row.querySelector('.row-posters');
                itens.filter(i => i.categoria === cat).forEach(it => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${it.capa}"><div class="card-title">${it.nome}</div>`;
                    card.onclick = () => iniciarPlayer(it.url, it.nome);
                    postCont.appendChild(card);
                });
                cont.appendChild(row);
            });
        }

        // ADM (SIMPLIFICADO PARA O CONTEXTO)
        function renderADM() {
            const t = document.getElementById('tabela-conteudo-adm');
            if(!t) return;
            t.innerHTML = "";
            bancoDados.forEach(d => {
                t.innerHTML += `<tr><td>${d.nome}</td><td><button onclick="window.delC('${d.id}')">X</button></td></tr>`;
            });
        }

        window.delC = (id) => remove(ref(db, `conteudo/${id}`));
        document.getElementById('btn-salvar-db').onclick = () => {
            const obj = {
                nome: document.getElementById('c-nome').value,
                tipo: document.getElementById('c-tipo').value,
                categoria: document.getElementById('c-cat').value.toUpperCase(),
                url: document.getElementById('c-links').value,
                capa: document.getElementById('c-capa').value
            };
            push(ref(db, 'conteudo'), obj);
            alert("Salvo!");
        };

        document.getElementById('b-a').onclick = () => {
            document.getElementById('main-content').style.display='none';
            document.getElementById('admin-panel').style.display='block';
        };
        document.getElementById('btn-voltar-adm').onclick = () => {
            document.getElementById('admin-panel').style.display='none';
            document.getElementById('main-content').style.display='block';
        };
    </script>
</body>
</html>
