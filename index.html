<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX ULTRA - V3</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --red: #E50914; --bg: #000; --card-bg: #141414; 
            --gray: #222; --light-gray: #333; --yellow: #f1c40f; --text: #fff; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; 
        }

        /* Loading */
        #loading-overlay { 
            display:none; position: fixed; inset:0; background: rgba(0,0,0,0.95); 
            z-index: 9999; align-items:center; justify-content:center; flex-direction:column; 
        }
        .spinner { 
            border:3px solid rgba(255,255,255,0.1); border-top:3px solid var(--red); 
            border-radius:50%; width:45px; height:45px; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header Netflix Style */
        .sticky-top { 
            position: sticky; top: 0; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 100%); 
        }
        
        header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: -1px; text-decoration: none; }
        
        .nav-btns { display: flex; gap: 8px; }
        .btn-header { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; }

        .secao-container { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .secao-container::-webkit-scrollbar { display: none; }
        .btn-secao { 
            padding: 7px 15px; background: transparent; border: 1px solid rgba(255,255,255,0.3); 
            color: #fff; border-radius: 20px; font-size: 12px; white-space: nowrap; transition: 0.2s;
        }
        .btn-secao.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        .search-container { padding: 0 15px 10px 15px; }
        .search-input { 
            width: 100%; padding: 10px 15px; background: var(--light-gray); 
            border: none; color: #fff; border-radius: 6px; font-size: 13px; 
        }

        /* Grid e Listas */
        .row { padding: 10px 0; }
        .row-header { display: flex; justify-content: space-between; padding: 0 15px; margin-bottom: 8px; }
        .row-title { font-size: 16px; font-weight: bold; }

        .shelf { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .shelf::-webkit-scrollbar { display: none; }

        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }

        /* Cards Design */
        .card { min-width: 105px; position: relative; border-radius: 6px; overflow: hidden; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #222; }
        .card-name { 
            padding: 5px; font-size: 10px; text-align: center; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: var(--card-bg);
        }
        .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; color: rgba(255,255,255,0.3); z-index: 5; }
        .fav-star.active { color: var(--yellow); }

        /* Modal Detalhes */
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; overflow-y: auto; }
        .modal-hero { position: relative; width: 100%; height: 40vh; background-size: cover; background-position: center; }
        .modal-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #000 10%, transparent 100%); }
        .modal-content { padding: 15px; position: relative; margin-top: -50px; z-index: 2; }
        .btn-play-grande { 
            width: 100%; padding: 14px; background: #fff; color: #000; border: none; 
            border-radius: 4px; font-weight: bold; font-size: 15px; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Fullscreen Player */
        #player-box { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 2000; 
            width: 100vw; height: 100vh;
        }
        .vjs-fullscreen-control { display: none !important; } /* Escondemos pois forçamos via código */

        .close-btn { 
            position: fixed; top: 15px; right: 15px; width: 35px; height: 35px; 
            background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 18px; z-index: 1001; 
        }

        /* Login */
        .input-adm { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div id="login-ui">
        <div style="position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999;">
            <div style="width: 85%; max-width: 320px; text-align: center;">
                <div class="logo" style="font-size: 40px; margin-bottom: 30px;">CLONEFLIX</div>
                <input type="text" id="user" placeholder="Usuário" class="input-adm">
                <input type="password" id="pass" placeholder="Senha" class="input-adm">
                <button onclick="autenticar()" style="width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:4px; font-weight:bold; cursor: pointer;">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="sticky-top">
            <header>
                <div class="logo">CLONEFLIX</div>
                <div class="nav-btns">
                    <button onclick="abrirADM()" id="adm-btn" class="btn-header" style="display:none; background:var(--red);">ADM</button>
                    <button onclick="logout()" class="btn-header">Sair</button>
                </div>
            </header>
            <div class="secao-container">
                <button class="btn-secao active" onclick="mudarSecao('live', this)">Canais</button>
                <button class="btn-secao" onclick="mudarSecao('movie', this)">Filmes</button>
                <button class="btn-secao" onclick="mudarSecao('series', this)">Séries</button>
                <button class="btn-secao" onclick="mostrarFavoritos(this)" style="color:var(--yellow)">★ Minha Lista</button>
            </div>
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="Buscar filmes, séries..." oninput="executarBusca(this.value)">
            </div>
        </div>
        <div id="conteudo-principal"></div>
    </div>

    <div id="modal-detalhes" class="modal">
        <div class="close-btn" onclick="fecharModais()">✕</div>
        <div id="detalhes-body"></div>
    </div>
    
    <div id="player-box">
        <div class="close-btn" onclick="fecharPlayer()" style="z-index: 2001;">✕</div>
        <video id="vid" class="video-js vjs-default-skin" controls playsinline preload="auto" width="100%" height="100%"></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var API = { url: "http://lunnabr1.site", u: "35215954", p: "54642513" }; 
        const FIREBASE = "https://cloneflix-16f9c-default-rtdb.firebaseio.com";
        const DB = `${FIREBASE}/usuarios`;

        var player = videojs('vid', { 
            fluid: false, 
            autoplay: false,
            userActions: { doubleClick: true }
        });

        var fullData = {};
        var currentLogged = {};
        var secaoAtual = 'live';

        window.onload = async () => {
            const saved = localStorage.getItem('clone_creds');
            if(saved) {
                const c = JSON.parse(saved);
                document.getElementById('user').value = c.u;
                document.getElementById('pass').value = c.p;
                autenticar(true);
            }
        };

        async function autenticar(isAuto = false) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return;

            if(u === "Rhuan" && p === "270412") { currentLogged = { user: "Rhuan", adm: true, favs: [] }; entrar(); return; }
            
            try {
                const res = await fetch(`${DB}.json`).then(r => r.json());
                for(let id in res) {
                    if(res[id].user === u && res[id].pass === p) {
                        localStorage.setItem('clone_creds', JSON.stringify({u, p}));
                        currentLogged = res[id]; currentLogged.id = id; entrar(); return;
                    }
                }
                if(!isAuto) alert("Credenciais Incorretas");
            } catch(e) { alert("Erro de conexão."); }
        }

        function entrar() {
            document.getElementById('login-ui').style.display='none';
            document.getElementById('app-ui').style.display='block';
            if(currentLogged.adm) document.getElementById('adm-btn').style.display='block';
            mudarSecao('live');
        }

        async function mudarSecao(tipo, btn) {
            secaoAtual = tipo;
            if(btn) { 
                document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); 
                btn.classList.add('active'); 
            }
            const principal = document.getElementById('conteudo-principal');
            principal.innerHTML = '<div style="text-align:center; padding:50px;"><div class="spinner" style="margin:0 auto;"></div></div>';
            
            const act = tipo==='live'?['get_live_categories','get_live_streams']:tipo==='movie'?['get_vod_categories','get_vod_streams']:['get_series_categories','get_series'];
            
            try {
                const [cats, streams] = await Promise.all([
                    fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${act[0]}`).then(r => r.json()),
                    fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${act[1]}`).then(r => r.json())
                ]);
                fullData[tipo] = streams; 
                renderizar(cats, streams, tipo);
            } catch(e) { principal.innerHTML = '<p style="text-align:center;">Erro ao carregar lista.</p>'; }
        }

        function renderizar(cats, streams, tipo) {
            let html = "";
            cats.slice(0, 30).forEach(cat => {
                const itens = streams.filter(s => s.category_id === cat.category_id).slice(0, 12);
                if(itens.length > 0) {
                    html += `<div class="row">
                        <div class="row-header"><span class="row-title">${cat.category_name}</span></div>
                        <div class="shelf">${itens.map(i => cardHtml(i, tipo)).join('')}</div>
                    </div>`;
                }
            });
            document.getElementById('conteudo-principal').innerHTML = html;
        }

        function cardHtml(i, tipo) {
            const id = i.stream_id || i.series_id;
            const img = i.stream_icon || i.cover || i.img;
            return `<div class="card" onclick="abrirConteudo('${id}', '${tipo}')">
                <img loading="lazy" src="${img}" onerror="this.src='https://via.placeholder.com/200x300/111/fff?text=Sem+Capa'">
                <div class="card-name">${i.name}</div>
            </div>`;
        }

        async function abrirConteudo(id, tipo) {
            if(tipo === 'live') return prepararPlay(id, 'm3u8', 'live');
            
            showLoad(true);
            const act = tipo === 'series' ? ['get_series_info','series_id'] : ['get_vod_info','vod_id'];
            
            try {
                const res = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${act[0]}&${act[1]}=${id}`).then(r => r.json());
                const info = res.info || res.movie_data || {};
                const ext = info.container_extension || 'mp4';
                
                let html = `
                    <div class="modal-hero" style="background-image: url('${info.cover || info.movie_image}')"></div>
                    <div class="modal-content">
                        <h2 style="margin:0;">${info.name}</h2>
                        <p style="color:#aaa; font-size:13px; line-height:1.4;">${info.plot || 'Sinopse indisponível.'}</p>
                        ${tipo==='series' ? carregarBotoesSeries(res.episodes) : `<button class="btn-play-grande" onclick="prepararPlay('${id}','${ext}','movie')">▶ ASSISTIR AGORA</button>`}
                    </div>`;
                document.getElementById('detalhes-body').innerHTML = html;
                document.getElementById('modal-detalhes').style.display = 'block';
            } catch(e) { alert("Erro ao carregar detalhes."); }
            finally { showLoad(false); }
        }

        function carregarBotoesSeries(episodes) {
            let h = '<div style="margin-top:20px;">';
            for(let s in episodes) {
                h += `<p style="font-weight:bold; color:var(--red)">Temporada ${s}</p>`;
                episodes[s].forEach(e => {
                    h += `<div class="ep-card" style="background:#111; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; border-radius:4px;" onclick="prepararPlay('${e.id || e.stream_id}','${e.container_extension || 'mp4'}','series')">
                        <span style="font-size:12px;">EP ${e.episode_num} - ${e.title}</span>
                        <span style="color:var(--red)">▶</span>
                    </div>`;
                });
            }
            return h + '</div>';
        }

        function prepararPlay(id, ext, tipo) {
            fecharModais();
            showLoad(true);
            const videoElement = document.getElementById('vid');
            document.getElementById('player-box').style.display = 'block';
            
            const finalUrl = `${API.url}/${tipo==='live'?'live':tipo==='movie'?'movie':'series'}/${API.u}/${API.p}/${id}.${ext}`;
            const mime = (ext === 'm3u8' || tipo === 'live') ? 'application/x-mpegURL' : 'video/mp4';

            player.src({ src: finalUrl, type: mime });
            
            player.ready(() => {
                player.play().then(() => {
                    showLoad(false);
                    forceFullscreen();
                }).catch(err => {
                    // Tenta sem extensão se falhar
                    player.src({ src: finalUrl.replace('.'+ext, ''), type: mime });
                    player.play().then(() => { showLoad(false); forceFullscreen(); });
                });
            });
        }

        function forceFullscreen() {
            const container = document.getElementById('player-box');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            else if (container.msRequestFullscreen) container.msRequestFullscreen();
            
            // Tenta girar a tela em celulares
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Giro bloqueado"));
            }
        }

        function fecharPlayer() {
            player.pause();
            document.getElementById('player-box').style.display = 'none';
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        }

        function showLoad(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function fecharModais() { document.getElementById('modal-detalhes').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function executarBusca(q) { if(!q) return mudarSeção(secaoAtual); const res = fullData[secaoAtual].filter(i => i.name.toLowerCase().includes(q.toLowerCase())).slice(0, 30); document.getElementById('conteudo-principal').innerHTML = `<div class="grid-view">${res.map(i => cardHtml(i, secaoAtual)).join('')}</div>`; }
    </script>
</body>
</html>
