<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX ULTRA</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --red: #E50914; --bg: #000; --card-bg: #141414; --gray: #222; --yellow: #f1c40f; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 2px solid var(--red); }
        header { padding: 12px 15px 5px 15px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--red); text-transform: uppercase; }
        .welcome-center { text-align: center; font-size: 11px; color: #ccc; background: #111; padding: 8px; border-radius: 5px; margin-bottom: 5px; line-height: 1.4; }
        .welcome-center b { color: var(--red); }
        .welcome-center span { color: var(--yellow); font-weight: bold; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-logout { background: none; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .search-container { padding: 5px 15px 10px 15px; }
        .search-input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .secao-container { display: flex; gap: 8px; padding: 10px 12px 15px 12px; overflow-x: auto; scrollbar-width: none; background: var(--bg); }
        .btn-secao { padding: 8px 18px; background: var(--gray); border: none; color: #fff; border-radius: 20px; font-weight: bold; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .btn-secao.active { background: var(--red); }
        .row { padding: 5px 0; }
        .row-header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 8px; }
        .row-title { font-size: 14px; font-weight: bold; }
        .btn-ver-mais { color: var(--red); font-size: 11px; font-weight: bold; background: none; border: none; cursor: pointer; }
        .shelf { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 10px; padding: 15px; }
        .card { min-width: 105px; max-width: 150px; border-radius: 5px; overflow: hidden; background: var(--card-bg); border: 1px solid #222; position: relative; cursor: pointer; }
        .card.in-progress { border: 2px solid var(--red); }
        .badge-continue { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; font-size: 7px; padding: 2px 4px; border-radius: 2px; z-index: 15; }
        .badge-season { position: absolute; bottom: 35px; right: 5px; background: rgba(0,0,0,0.8); color: var(--yellow); font-size: 8px; padding: 2px 5px; border-radius: 3px; z-index: 15; border: 1px solid var(--yellow); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-name { padding: 5px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-star { position: absolute; top: 5px; right: 5px; font-size: 18px; text-shadow: 0 0 5px #000; cursor: pointer; z-index: 10; color: #ccc; }
        .fav-star.active { color: var(--yellow); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 15px; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 28px; color: #fff; cursor: pointer; z-index: 1001; }
        .user-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #333; font-size: 11px; }
        .btn-adm { border: none; padding: 8px; border-radius: 4px; font-size: 9px; font-weight: bold; color: #fff; cursor: pointer; margin-top: 5px; }
        .input-adm { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        #player-box { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .ep-item { padding: 15px; border-bottom: 1px solid #222; text-align: left; background: #111; margin-bottom: 5px; border-radius: 5px; cursor: pointer; }
        .ep-item.highlight { border-left: 4px solid var(--red); background: #1a0a0a; }
    </style>
</head>
<body>

    <div id="login-ui">
        <div style="position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999;">
            <div style="width: 85%; max-width: 340px; background: #111; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #333;">
                <h1 style="color:var(--red); margin-bottom:5px;">CLONEFLIX</h1>
                <div id="login-status" style="font-size: 11px; margin-bottom: 15px; color: var(--yellow);">Aguardando credenciais...</div>
                <input type="text" id="user" placeholder="Usuário" class="input-adm">
                <input type="password" id="pass" placeholder="Senha" class="input-adm">
                <button onclick="autenticar()" style="width:100%; padding:15px; background:var(--red); color:#fff; border:none; border-radius:5px; font-weight:bold;">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="sticky-top">
            <header>
                <div class="header-top">
                    <div class="logo">CLONEFLIX</div>
                    <div class="nav-btns">
                        <button onclick="abrirADM()" id="adm-btn" style="display:none; background:var(--red); border:none; color:#fff; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold;">ADM</button>
                        <button onclick="logout()" class="btn-logout">SAIR</button>
                    </div>
                </div>
                <div id="welcome-msg" class="welcome-center"></div>
            </header>
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="Pesquisar conteúdo..." oninput="executarBusca(this.value)">
            </div>
            <div class="secao-container">
                <button class="btn-secao active" onclick="mudarSecao('live', this)">CANAIS</button>
                <button class="btn-secao" onclick="mudarSecao('movie', this)">FILMES</button>
                <button class="btn-secao" onclick="mudarSecao('series', this)">SÉRIES</button>
                <button class="btn-secao" onclick="mostrarFavoritos(this)" style="color:var(--yellow)">★ MINHA LISTA</button>
            </div>
        </div>
        <div id="conteudo-principal"></div>
    </div>

    <div id="modal-adm" class="modal">
        <span class="close-modal" onclick="fecharModais()">✕</span>
        <h3 style="color:var(--red); text-align:center;">PAINEL GESTOR</h3>
        <div style="background:#111; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid var(--red);">
            <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--red);">SERVIDOR IPTV</h4>
            <input type="text" id="adm-url" placeholder="URL DNS" class="input-adm">
            <input type="text" id="adm-u" placeholder="Usuário IPTV" class="input-adm">
            <input type="text" id="adm-p" placeholder="Senha IPTV" class="input-adm">
            <button onclick="salvarConfigServidor()" style="width:100%; padding:10px; background:#27ae60; color:#fff; border:none; border-radius:5px; font-weight:bold;">ATUALIZAR DNS</button>
        </div>
        <div id="adm-form" style="background:#111; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #444;">
            <h4 style="margin:0 0 10px 0; font-size:12px;">GERENCIAR ACESSO</h4>
            <input type="hidden" id="edit-id"><input type="hidden" id="old-exp">
            <input type="text" id="new-u" placeholder="Login" class="input-adm">
            <input type="text" id="new-p" placeholder="Senha" class="input-adm">
            <input type="number" id="new-days" placeholder="Dias de acesso" class="input-adm">
            <input type="number" id="new-screens" placeholder="Limite de Telas" class="input-adm" value="1">
            <button onclick="salvarUsuario()" id="btn-save-adm" style="width:100%; padding:12px; background:var(--red); color:#fff; border:none; border-radius:5px; font-weight:bold;">SALVAR CLIENTE</button>
        </div>
        <div id="lista-usuarios-adm"></div>
    </div>

    <div id="modal-detalhes" class="modal"><span class="close-modal" onclick="fecharModais()">✕</span><div id="detalhes-body" style="text-align:center; max-width:500px; margin:40px auto; padding-bottom:50px;"></div></div>
    <div id="modal-escolha-ep" class="modal" style="z-index: 1100; background: rgba(0,0,0,0.95);"><span class="close-modal" onclick="fecharModalEscolha()">✕</span><div id="escolha-body" style="text-align:center; margin-top:30vh; padding:20px;"></div></div>
    <div id="player-box"><span class="close-modal" onclick="fecharPlayer()" style="left:15px; top:15px;">✕</span><video id="vid" class="video-js vjs-fill vjs-big-play-centered" controls></video></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var API = { url: "http://lunnabr1.site", u: "35215954", p: "54642513" }; 
        const FIREBASE = "https://cloneflix-16f9c-default-rtdb.firebaseio.com";
        const DB = `${FIREBASE}/usuarios`;
        
        var player = videojs('vid');
        var fullData = {}; var currentLogged = {}; var secaoAtual = 'live'; var saveInterval = null;
        var relogioInterval = null;
        var wakeLock = null; 

        // GERA ID ÚNICO DO APARELHO
        function obterDeviceId() {
            let id = localStorage.getItem('clone_device_id');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + Date.now();
                localStorage.setItem('clone_device_id', id);
            }
            return id;
        }

        window.onload = async () => {
            await carregarConfigServidor();
            const saved = localStorage.getItem('clone_creds');
            if(saved) {
                const c = JSON.parse(saved);
                document.getElementById('user').value = c.u;
                document.getElementById('pass').value = c.p;
                autenticar(true);
            }
        };

        async function carregarConfigServidor() {
            try {
                const res = await fetch(`${FIREBASE}/config.json`).then(r => r.json());
                if(res && res.server) API = res.server;
            } catch(e) {}
        }

        async function autenticar(isAuto = false) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const statusDiv = document.getElementById('login-status');
            const deviceId = obterDeviceId();

            if(!u || !p) return;

            if(u === "Rhuan" && p === "270412") { 
                currentLogged = { user: "Rhuan", adm: true, id: "admin", screens: 99, expira: 4102444800000 }; 
                entrar(); return; 
            }

            statusDiv.innerText = "Verificando...";
            try {
                const res = await fetch(`${DB}.json`).then(r => r.json());
                let found = false;
                for(let id in res) {
                    const user = res[id];
                    if(user.user === u && user.pass === p) {
                        found = true;
                        if(user.status === 'bloqueado' || user.status === 'suspenso') {
                            statusDiv.innerText = "ACESSO BLOQUEADO!";
                            return alert("Acesso bloqueado!");
                        }
                        if(user.expira && user.expira < Date.now()) {
                            statusDiv.innerText = "ACESSO VENCIDO!";
                            return alert("Acesso vencido!");
                        }

                        // LÓGICA DE SINCRONIZAÇÃO DE TELAS COM O SEGUNDO CÓDIGO
                        let aparelhos = user.active_devices || [];
                        if (!aparelhos.includes(deviceId)) {
                            if (aparelhos.length >= (user.screens || 1)) {
                                statusDiv.innerText = "LIMITE DE TELAS!";
                                return alert("Limite de telas atingido!");
                            }
                            aparelhos.push(deviceId);
                            // ATUALIZA O FIREBASE COM O CONTADOR QUE O SEGUNDO CÓDIGO LÊ
                            await fetch(`${DB}/${id}.json`, { 
                                method: 'PATCH', 
                                body: JSON.stringify({ 
                                    active_devices: aparelhos, 
                                    online_count: aparelhos.length 
                                }) 
                            });
                        }

                        currentLogged = user; 
                        currentLogged.id = id;
                        localStorage.setItem('clone_creds', JSON.stringify({u, p}));
                        entrar(); break;
                    }
                }
                if(!found && !isAuto) statusDiv.innerText = "Login incorreto!";
            } catch(e) { statusDiv.innerText = "Erro ao conectar."; }
        }

        function entrar() { 
            document.getElementById('login-ui').style.display='none'; 
            document.getElementById('app-ui').style.display='block'; 
            if(currentLogged.adm) document.getElementById('adm-btn').style.display='block';
            mudarSecao('live'); 
        }

        // --- RESTANTE DAS FUNÇÕES ORIGINAIS (PLAYER, RENDERIZAR, ETC) MANTIDAS ---

        async function logout() {
            if (currentLogged && currentLogged.id !== "admin") {
                const deviceId = obterDeviceId();
                const res = await fetch(`${DB}/${currentLogged.id}.json`).then(r => r.json());
                let aparelhos = res.active_devices || [];
                aparelhos = aparelhos.filter(id => id !== deviceId);
                // ATUALIZA O FIREBASE AO SAIR PARA O PAINEL MOSTRAR "0" TELAS
                await fetch(`${DB}/${currentLogged.id}.json`, { 
                    method: 'PATCH', 
                    body: JSON.stringify({ 
                        active_devices: aparelhos, 
                        online_count: aparelhos.length 
                    }) 
                });
            }
            localStorage.removeItem('clone_creds'); 
            location.reload(); 
        }

        async function mudarSecao(tipo, btn) {
            secaoAtual = tipo;
            if(btn) { document.querySelectorAll('.btn-secao').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const principal = document.getElementById('conteudo-principal');
            principal.innerHTML = '<p style="text-align:center;padding:30px;color:var(--red);">Carregando...</p>';
            const catAct = tipo==='live'?'get_live_categories':tipo==='movie'?'get_vod_categories':'get_series_categories';
            const streamAct = tipo==='live'?'get_live_streams':tipo==='movie'?'get_vod_streams':'get_series';
            try {
                const cats = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${catAct}`).then(r => r.json());
                const streams = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${streamAct}`).then(r => r.json());
                fullData[tipo] = streams; renderizar(cats, streams, tipo);
            } catch(e) { principal.innerHTML = '<p style="text-align:center;">Erro IPTV.</p>'; }
        }

        function renderizar(cats, streams, tipo) {
            let html = "";
            cats.slice(0, 30).forEach(cat => {
                const itens = streams.filter(s => s.category_id === cat.category_id);
                if(itens.length > 0) html += `<div class="row"><div class="row-header"><span class="row-title">${cat.category_name}</span></div><div class="shelf">${itens.slice(0, 12).map(i => cardHtml(i, tipo)).join('')}</div></div>`;
            });
            document.getElementById('conteudo-principal').innerHTML = html;
        }

        function cardHtml(i, tipo) {
            const id = String(i.stream_id || i.series_id);
            const imgUrl = i.stream_icon || i.cover || i.img;
            return `<div class="card" onclick="abrirConteudo('${id}', '${tipo}')">
                <img loading="lazy" src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225?text=Sem+Foto'">
                <div class="card-name">${i.name}</div>
            </div>`;
        }

        async function abrirConteudo(id, tipo) { 
            if(tipo === 'live') return play(id, 'm3u8', 'live'); 
            const res = await fetch(`${API.url}/player_api.php?username=${API.u}&password=${API.p}&action=${tipo==='series'?'get_series_info':'get_vod_info'}&${tipo==='series'?'series_id':'vod_id'}=${id}`).then(r => r.json()); 
            const info = res.info || res.movie_data; 
            let html = `<img src="${info.cover || info.movie_image}" style="width:160px; border-radius:8px;"><h2>${info.name}</h2><button onclick="play('${id}','${info.container_extension||'mp4'}','${tipo}')" style="width:90%; padding:15px; background:var(--red); color:#fff; border:none; font-weight:bold; border-radius:5px;">ASSISTIR</button>`;
            document.getElementById('detalhes-body').innerHTML = html; document.getElementById('modal-detalhes').style.display = 'block'; 
        }

        async function play(id, ext, tipo) {
            let url = (tipo === 'live') ? `${API.url}/live/${API.u}/${API.p}/${id}.m3u8` : (tipo === 'movie') ? `${API.url}/movie/${API.u}/${API.p}/${id}.${ext||'mp4'}` : `${API.url}/series/${API.u}/${API.p}/${id}.${ext||'mp4'}`;
            document.getElementById('player-box').style.display = 'block';
            player.src({ src: url, type: tipo==='live'?'application/x-mpegURL':'video/mp4' });
            player.play();
        }

        function fecharPlayer() { player.pause(); document.getElementById('player-box').style.display='none'; }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
